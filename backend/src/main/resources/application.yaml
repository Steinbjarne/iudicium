spring:
  application:
    name: research-backend
  mongodb:
    uri: ${MONGO_URI:mongodb://admin:secret@mongodb:27017/iudicium?authSource=admin&serverSelectionTimeoutMS=3000&connectTimeoutMS=3000&socketTimeoutMS=3000}
  mvc:
    problemdetails:
      enabled: true
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
springdoc:
  swagger-ui:
    use-root-path: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs