services:
  mongodb:
    image: mongo:7
    container_name: iudicium-mongodb
    restart: unless-stopped
    volumes:
      - ../data/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" --quiet"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: ${BACKEND_BUILD_TARGET:-debug}
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://admin:secret@mongodb:27017/iudicium?authSource=admin&serverSelectionTimeoutMS=3000&connectTimeoutMS=3000&socketTimeoutMS=3000
    depends_on:
      mongodb:
        condition: service_healthy