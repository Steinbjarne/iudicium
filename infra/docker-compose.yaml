services:
  mongodb:
    image: mongo:7
    container_name: iudicium-mongodb
    restart: unless-stopped
    volumes:
      - ../data/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: ${BACKEND_BUILD_TARGET:-debug}
    ports:
      - "8080:8080"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: iudicium
      MONGO_USERNAME: admin
      MONGO_PASSWORD: secret
